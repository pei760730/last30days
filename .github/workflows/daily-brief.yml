name: daily-brief

# 每天把 research-topics.txt 前 3 個主題各跑一份 last30days brief,
# 合併後透過 kai-notify 推到 Kai 的 Telegram(@MYNOOTIFYBot)。
# 需要 repo secrets:KAI_NOTIFY_BOT_TOKEN、KAI_NOTIFY_CHAT_ID。

on:
  schedule:
    - cron: "0 23 * * *"   # 23:00 UTC = 07:00 Asia/Taipei(隔天早上)
  workflow_dispatch:
    inputs:
      topic:
        description: "一次性主題(留空 = 讀 research-topics.txt 前 3 個)"
        required: false
        default: ""

concurrency:
  group: daily-brief
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate briefs
        id: gen
        env:
          # headless 沒 host 模型,靠這把免費 Gemini key 當推理大腦(規劃+排序+合成)。
          # 空值 = 自動 fallback 到內建 deterministic,不會壞。
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          # workflow_dispatch 輸入走 env,不在 run: 內文直接 ${{ }} 內插(避免 template injection)
          TOPIC: ${{ github.event.inputs.topic }}
        run: |
          set -uo pipefail
          CLI="skills/last30days/scripts/last30days.py"

          # 決定主題清單
          if [ -n "$TOPIC" ]; then
            printf '%s\n' "$TOPIC" > .topics
          else
            grep -vE '^[[:space:]]*#|^[[:space:]]*$' research-topics.txt | head -3 > .topics
          fi

          : > digest.md
          while IFS= read -r t; do
            [ -z "$t" ] && continue
            echo "→ researching: $t" >&2
            python "$CLI" "$t" --emit brief 2>/dev/null > brief.txt || true
            {
              # 標題 + 日期 + 來源那段
              sed -n '/^# Production Brief/,/^## Ranked Storylines/p' brief.txt
              # 該主題前 3 條 storyline
              awk '/^### /{n++} n>=1 && n<=3' brief.txt
              echo ""
            } >> digest.md
          done < .topics

          # 沒抓到任何內容時給個保底訊息
          # 判「去空白後是否為空」:迴圈每題固定 echo "" 進 digest.md,
          # 純 -s(size>0)永遠為真,保底會變死碼、空內容直推 Telegram 反觸發假 FAILED
          if [ -z "$(tr -d '[:space:]' < digest.md)" ]; then
            echo "⚠️ last30days daily-brief 這次沒產出內容(來源可能全部無回應)。" > digest.md
          fi

          # Telegram 上限 4096 字元,保守截到 3500
          # 按「字元」截斷,不用 head -c(位元組截斷會切壞 UTF-8 中文/emoji → Telegram 400)
          # 截斷後必補結尾換行 + 去 \r:檔尾沒 \n 時 heredoc 關閉分隔符會黏在內容同一行,
          # GITHUB_OUTPUT 配對失敗 "Matching delimiter not found"(7/15、7/17 兩次間歇紅根因——
          # 只在內容超長被截斷的日子觸發)
          python -c "import sys; t=open('digest.md',encoding='utf-8').read().replace('\r',''); t=t[:3500]; open('digest.md','w',encoding='utf-8').write(t if t.endswith('\n') else t+'\n')"

          {
            # 分隔符隨機化:內容來自外部抓取,固定字串理論上可能被內容撞掉
            DELIM="KN_EOF_${RANDOM}${RANDOM}"
            echo "text<<${DELIM}"
            cat digest.md
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Push brief to Telegram (kai-notify, fail-soft)
        uses: pei760730/kai-notify@v1
        env:
          KAI_NOTIFY_BOT_TOKEN: ${{ secrets.KAI_NOTIFY_BOT_TOKEN }}
          KAI_NOTIFY_CHAT_ID: ${{ secrets.KAI_NOTIFY_CHAT_ID }}
        with:
          text: ${{ steps.gen.outputs.text }}

      - name: Report failure to Kai (fail-soft)
        if: failure()
        uses: pei760730/kai-notify@v1
        env:
          KAI_NOTIFY_BOT_TOKEN: ${{ secrets.KAI_NOTIFY_BOT_TOKEN }}
          KAI_NOTIFY_CHAT_ID: ${{ secrets.KAI_NOTIFY_CHAT_ID }}
        with:
          text: "🔴 last30days daily-brief FAILED — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
